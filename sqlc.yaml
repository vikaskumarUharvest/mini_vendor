version: "2"
sql:
  - schema: "repository/sql/user.sql"
    queries: "repository/sql/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "dbgen"
        out: "repository/postgres/dbgen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
